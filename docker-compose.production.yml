version: '3.9'

volumes:
  pg_data:
  static:
  media:

services:
  postgres:
    image: postgres:13
    container_name: postgres
    env_file:
      - kitty.env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: maxagava/kittygram_backend:latest
    container_name: backend
    env_file:
      - kitty.env
    volumes:
      - static:/backend_static
      - media:/app/media
    depends_on:
      - postgres

  frontend:
    image: maxagava/kittygram_frontend:latest
    container_name: frontend
    command: cp -r /app/build/. /backend_static/
    volumes:
      - static:/backend_static

  gateway:
    build: ./nginx
    container_name: gateway
    ports:
      - "9000:80"
    volumes:
      - static:/backend_static
      - media:/media
    depends_on:
      - backend
      - frontend
