
volumes:
  pg_data:
  static:
  media:

services:
  postgres:
    image: postgres:13
    container_name: postgres
    env_file:
      - kitty.env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend
    env_file:
      - kitty.env
    volumes:
      - static:/backend_static
      - media:/media
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: frontend
    command: cp -r /app/build/. /static/
    volumes:
      - static:/static

  gateway:
    build: ./nginx
    container_name: gateway
    ports:
      - "9000:80"
    volumes:
      - static:/backend_static
      - media:/media
    depends_on:
      - backend