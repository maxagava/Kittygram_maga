name: Kittygram CI/CD
on:
  push:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Backend tests
      run: |
        docker compose -f tests/docker-compose.yml up --build backend-tests || true
  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build & push images
      run: |
        docker build -t maxagava/kittygram_backend:latest ./backend
        docker build -t maxagava/kittygram_frontend:latest ./frontend  
        docker build -t maxagava/kittygram_gateway:latest ./nginx
        docker push maxagava/kittygram_backend:latest
        docker push maxagava/kittygram_frontend:latest
        docker push maxagava/kittygram_gateway:latest
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd ~/Kittygram_maga
          git pull origin main
          docker compose down
          docker compose pull
          docker compose up -d
          docker compose exec backend python manage.py migrate || true
