name: Kittygram Simple CI/CD
on:
  push:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Backend tests
      run: |
        docker compose -f tests/docker-compose.yml up --build backend-tests || true
        
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    
    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & push backend
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: true
        tags: maxagava/kittygram_backend:latest

    - name: Build & push frontend  
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: true
        tags: maxagava/kittygram_frontend:latest

    - name: Build & push gateway
      uses: docker/build-push-action@v6
      with:
        context: ./nginx
        push: true
        tags: maxagava/kittygram_gateway:latest
